<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Ashley PT Tracker</title>
  <meta name="theme-color" content="#2c2a27" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <meta name="apple-mobile-web-app-title" content="PT Tracker" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600;700&family=DM+Serif+Display&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body { background: #f5f2ee; font-family: 'DM Sans', sans-serif; }

    /* ── GATE ── */
    #gate {
      position: fixed; inset: 0; z-index: 999;
      background: #2c2a27;
      display: flex; flex-direction: column;
      align-items: center; justify-content: center; gap: 16px;
    }
    #gate h2 { font-family: 'DM Serif Display', serif; font-size: 2rem; color: #fff; letter-spacing: -0.3px; }
    #gate-sub { font-size: 13px; color: #9e9890; letter-spacing: 1px; }
    #gate-input {
      background: #3a3835; border: 1.5px solid #555; color: #fff;
      font-family: 'DM Sans', sans-serif; font-size: 1rem; letter-spacing: 3px;
      padding: 12px 20px; border-radius: 10px; text-align: center;
      width: 220px; outline: none; transition: border-color 0.2s;
    }
    #gate-input:focus { border-color: #c8a96e; }
    #gate-input.shake { animation: shake 0.3s ease; border-color: #e57373; }
    @keyframes shake {
      0%,100% { transform: translateX(0); }
      25%      { transform: translateX(-8px); }
      75%      { transform: translateX(8px); }
    }
    .gate-remember {
      display: flex; align-items: center; gap: 8px;
      font-size: 12px; color: #9e9890; cursor: pointer;
    }
    .gate-remember input { accent-color: #c8a96e; width: 14px; height: 14px; cursor: pointer; }
    #gate-btn {
      background: #c8a96e; color: #2c2a27; border: none;
      font-family: 'DM Sans', sans-serif; font-size: 13px; font-weight: 700;
      letter-spacing: 1.5px; text-transform: uppercase;
      padding: 12px 32px; border-radius: 10px; cursor: pointer; transition: opacity 0.2s;
    }
    #gate-btn:hover { opacity: 0.85; }
    #gate-error { font-size: 12px; color: #e57373; height: 16px; letter-spacing: 1px; }

    /* ── APP ── */
    #root { display: none; }
    #root.visible { display: block; }
  </style>
</head>
<body>

<!-- GATE -->
<div id="gate">
  <h2>Ashley PT Tracker</h2>
  <div id="gate-sub">ACL Recovery · Post-Op</div>
  <input id="gate-input" type="password" placeholder="Password" autocomplete="off"
    onkeydown="if(event.key==='Enter') checkGate()" />
  <div id="gate-error"></div>
  <label class="gate-remember">
    <input type="checkbox" id="gate-remember" /> Remember me
  </label>
  <button id="gate-btn" onclick="checkGate()">Enter</button>
</div>

<!-- APP ROOT -->
<div id="root"></div>

<script src="https://unpkg.com/react@18/umd/react.production.min.js" crossorigin></script>
<script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js" crossorigin></script>
<script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

<script>
  const PASSWORD = "Bravo";

  window.checkGate = function() {
    const input    = document.getElementById('gate-input');
    const err      = document.getElementById('gate-error');
    const remember = document.getElementById('gate-remember').checked;
    if (input.value === PASSWORD) {
      if (remember) localStorage.setItem('pt-auth', '1');
      else sessionStorage.setItem('pt-auth', '1');
      document.getElementById('gate').style.display = 'none';
      document.getElementById('root').classList.add('visible');
    } else {
      err.textContent = 'Wrong password';
      input.classList.add('shake');
      input.value = '';
      setTimeout(() => { input.classList.remove('shake'); err.textContent = ''; }, 800);
    }
  };

  if (localStorage.getItem('pt-auth') === '1' || sessionStorage.getItem('pt-auth') === '1') {
    document.getElementById('gate').style.display = 'none';
    document.getElementById('root').classList.add('visible');
  }
</script>

<script type="text/babel">
const { useState, useEffect } = React;

const EXERCISES = [
  // Standing first
  { id: "e1", name: "Calf Raises",           detail: "× 20",  sets: 2, note: "standing" },
  { id: "e2", name: "Hip Flexor",             detail: "× 20",  sets: 2, note: "standing" },
  { id: "e3", name: "Heel Slides",            detail: "× 15",  sets: 2, note: "standing" },
  // Floor
  { id: "e4", name: "Hip Abductions",         detail: "× 20",  sets: 2 },
  { id: "e5", name: "Quad Sets",              detail: "× 10",  sets: 2, note: "10 sec hold each" },
  { id: "e6", name: "Leg Raises",             detail: "× 10",  sets: 3 },
  { id: "e7", name: "Prone Quad Activations", detail: "× 30",  sets: 1, note: "3 sec hold each" },
  { id: "e8", name: "Heel Slides with Strap", detail: "× 10",  sets: 2, note: "supine" },
];

const TOTAL_SETS = EXERCISES.reduce((sum, ex) => sum + ex.sets, 0);
const SURGERY_DATE = new Date("2026-03-19");
const DAY_LABELS = ["M","T","W","T","F","S","S"];

const toKey = (d) => d.toISOString().slice(0, 10);
const todayKey = () => toKey(new Date());

function getWeekDays() {
  const today = new Date();
  const dow = today.getDay();
  const monday = new Date(today);
  monday.setDate(today.getDate() - ((dow + 6) % 7));
  return Array.from({ length: 7 }, (_, i) => {
    const d = new Date(monday);
    d.setDate(monday.getDate() + i);
    return { label: DAY_LABELS[i], key: toKey(d), isToday: toKey(d) === todayKey() };
  });
}

function loadSets(dateKey) {
  try { return JSON.parse(localStorage.getItem(`pt_sets_${dateKey}`) || "{}"); }
  catch { return {}; }
}
function saveSets(dateKey, data) {
  localStorage.setItem(`pt_sets_${dateKey}`, JSON.stringify(data));
}

function countDone(setsData) {
  return Object.values(setsData).filter(Boolean).length;
}

function getDayStatus(dateKey) {
  const done = countDone(loadSets(dateKey));
  if (done === 0) return "red";
  if (done >= TOTAL_SETS) return "green";
  return "orange";
}

const STATUS_COLORS = { red: "#e53935", orange: "#fb8c00", green: "#43a047" };

function WeekBar() {
  const days = getWeekDays();
  return (
    <div style={{ display: "flex", justifyContent: "space-between", padding: "0 4px", marginTop: "16px" }}>
      {days.map(({ label, key, isToday }) => {
        const status = getDayStatus(key);
        const color = STATUS_COLORS[status];
        return (
          <div key={key} style={{ display: "flex", flexDirection: "column", alignItems: "center", gap: "5px" }}>
            <div style={{
              width: "34px", height: "34px", borderRadius: "50%",
              background: color,
              border: isToday ? "2.5px solid #fff" : "none",
              boxShadow: isToday ? "0 0 0 2px " + color : "none",
              display: "flex", alignItems: "center", justifyContent: "center",
            }} />
            <div style={{
              fontSize: "11px", fontWeight: isToday ? "700" : "400",
              color: isToday ? "#fff" : "#9e9890",
              fontFamily: "'DM Sans', sans-serif",
            }}>{label}</div>
          </div>
        );
      })}
    </div>
  );
}

function SetBubbles({ exId, sets, setsData, onToggle }) {
  return (
    <div style={{ display: "flex", gap: "8px", flexShrink: 0 }}>
      {Array.from({ length: sets }, (_, i) => {
        const key = `${exId}_${i}`;
        const done = !!setsData[key];
        return (
          <button
            key={i}
            onClick={(e) => { e.stopPropagation(); onToggle(key); }}
            style={{
              width: "32px", height: "32px", borderRadius: "50%",
              border: done ? "none" : "2px solid #c5bfb8",
              background: done ? "#4caf50" : "transparent",
              cursor: "pointer",
              display: "flex", alignItems: "center", justifyContent: "center",
              transition: "all 0.2s ease",
              fontSize: "11px", fontWeight: "700",
              color: done ? "#fff" : "#9e9890",
              flexShrink: 0,
            }}
          >
            {done ? (
              <svg width="12" height="9" viewBox="0 0 14 10" fill="none">
                <path d="M1 5L5 9L13 1" stroke="white" strokeWidth="2.5" strokeLinecap="round" strokeLinejoin="round"/>
              </svg>
            ) : i + 1}
          </button>
        );
      })}
    </div>
  );
}

function ExerciseItem({ ex, setsData, onToggle }) {
  const doneSets = Array.from({ length: ex.sets }, (_, i) => setsData[`${ex.id}_${i}`]).filter(Boolean).length;
  const allDone = doneSets === ex.sets;

  return (
    <div style={{
      display: "flex", alignItems: "center", gap: "14px",
      background: allDone ? "#e8f5e9" : "#fff",
      border: allDone ? "1.5px solid #81c784" : "1.5px solid #e0ddd8",
      borderRadius: "14px", padding: "14px 16px",
      marginBottom: "10px",
      boxShadow: allDone ? "none" : "0 1px 4px rgba(0,0,0,0.06)",
      transition: "all 0.2s ease",
    }}>
      <div style={{ flex: 1, minWidth: 0 }}>
        <div style={{
          fontFamily: "'DM Sans', sans-serif", fontSize: "15px", fontWeight: "600",
          color: allDone ? "#558b5a" : "#2c2a27",
          textDecoration: allDone ? "line-through" : "none",
          lineHeight: 1.3,
        }}>
          {ex.name}
        </div>
        <div style={{
          fontFamily: "'DM Sans', sans-serif", fontSize: "12px",
          color: allDone ? "#81c784" : "#9e9890", marginTop: "2px",
        }}>
          {ex.detail}{ex.note ? ` · ${ex.note}` : ""}
          {ex.sets > 1 ? ` · ${doneSets}/${ex.sets} sets` : ""}
        </div>
      </div>
      <SetBubbles exId={ex.id} sets={ex.sets} setsData={setsData} onToggle={onToggle} />
    </div>
  );
}

function PTTracker() {
  const [setsData, setSetsData] = useState(() => loadSets(todayKey()));

  const toggle = (key) => {
    const next = { ...setsData, [key]: !setsData[key] };
    setSetsData(next);
    saveSets(todayKey(), next);
  };

  const done = countDone(setsData);
  const pct = Math.round((done / TOTAL_SETS) * 100);
  const allDone = done >= TOTAL_SETS;
  const today = new Date().toLocaleDateString("en-US", { weekday: "long", month: "long", day: "numeric" });
  const dayNum = Math.floor((new Date() - SURGERY_DATE) / 86400000);

  return (
    <div style={{ minHeight: "100vh", background: "#f5f2ee", fontFamily: "'DM Sans', sans-serif", paddingBottom: "40px" }}>
      {/* Header */}
      <div style={{ background: "#2c2a27", padding: "28px 24px 24px", color: "#fff" }}>
        <div style={{ fontFamily: "'DM Serif Display', serif", fontSize: "26px", letterSpacing: "-0.3px", marginBottom: "2px" }}>
          ACL Recovery
        </div>
        <div style={{ fontSize: "13px", color: "#9e9890", marginBottom: "4px" }}>{today}</div>
        <div style={{ fontSize: "12px", color: "#9e9890", marginBottom: "16px" }}>
          Day {dayNum} post-op · BPTB ACL + partial meniscectomy
        </div>

        {/* Weekly tracker */}
        <WeekBar />

        {/* Progress bar */}
        <div style={{ marginTop: "20px" }}>
          <div style={{ fontSize: "12px", color: "#9e9890", marginBottom: "6px", fontWeight: "500", letterSpacing: "0.5px", textTransform: "uppercase" }}>
            {done}/{TOTAL_SETS} sets done
          </div>
          <div style={{ height: "6px", background: "#454340", borderRadius: "3px", overflow: "hidden" }}>
            <div style={{
              height: "100%", width: `${pct}%`,
              background: allDone ? "#4caf50" : "#c8a96e",
              borderRadius: "3px", transition: "width 0.4s ease",
            }} />
          </div>
        </div>
      </div>

      {/* Exercise list */}
      <div style={{ padding: "20px 20px 0" }}>
        <div style={{ fontSize: "11px", fontWeight: "600", color: "#9e9890", letterSpacing: "0.8px", textTransform: "uppercase", marginBottom: "10px" }}>
          Standing
        </div>
        {EXERCISES.slice(0, 3).map(ex => (
          <ExerciseItem key={ex.id} ex={ex} setsData={setsData} onToggle={toggle} />
        ))}

        <div style={{ fontSize: "11px", fontWeight: "600", color: "#9e9890", letterSpacing: "0.8px", textTransform: "uppercase", margin: "16px 0 10px" }}>
          Floor
        </div>
        {EXERCISES.slice(3).map(ex => (
          <ExerciseItem key={ex.id} ex={ex} setsData={setsData} onToggle={toggle} />
        ))}
      </div>

      {allDone && (
        <div style={{
          margin: "16px 20px 0", background: "#e8f5e9", border: "1.5px solid #81c784",
          borderRadius: "14px", padding: "16px", textAlign: "center",
          color: "#388e3c", fontWeight: "600", fontSize: "15px",
        }}>
          All done for today 💪 Rest up.
        </div>
      )}
    </div>
  );
}

const root = ReactDOM.createRoot(document.getElementById('root'));
root.render(<PTTracker />);
</script>

</body>
</html>
